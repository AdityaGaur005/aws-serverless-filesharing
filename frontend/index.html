<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShareBuddy</title>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{background:#020617;}
.glow{position:fixed;border-radius:9999px;filter:blur(100px);opacity:.25;pointer-events:none}
.glow1{width:350px;height:350px;background:#3b82f6;top:-80px;left:-80px}
.glow2{width:350px;height:350px;background:#8b5cf6;bottom:-80px;right:-80px}
</style>
</head>

<body class="min-h-screen text-white">
<div class="glow glow1"></div>
<div class="glow glow2"></div>
<div id="root"></div>

<script type="text/babel">
const {useState,useRef}=React;

function App(){
const [file,setFile]=useState(null);
const [shareLink,setShareLink]=useState("");
const [uploadStatus,setUploadStatus]=useState("");
const fileInputRef=useRef();

const handleUpload=async()=>{
if(!file)return;

setUploadStatus("uploading");
setShareLink("");

try{
const uploadRes=await fetch(
"https://t01cm5dmbi.execute-api.ap-south-1.amazonaws.com/uploads",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
filename:file.name,
contentType:file.type
})
}
);

const uploadData=await uploadRes.json();

const {uploadUrl,fileKey,shortCode}=uploadData;

const putResp=await fetch(uploadUrl,{
method:"PUT",
headers:{"Content-Type":file.type},
body:file
});

if(!putResp.ok) throw new Error();

const shortUrl=`https://t01cm5dmbi.execute-api.ap-south-1.amazonaws.com/file/${shortCode}`;

setShareLink(shortUrl);
setUploadStatus("success");
}
catch(err){
setUploadStatus("error");
}
};

return(
<div className="max-w-6xl mx-auto px-6 py-16">

<div className="text-center mb-12">
<div className="inline-block px-4 py-2 rounded-full border border-blue-500/30 bg-blue-500/10 text-blue-300 mb-6">
☁ AWS Powered
</div>

<h1 className="text-6xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 text-transparent bg-clip-text">
ShareBuddy
</h1>

<p className="text-slate-400 mt-4 max-w-2xl mx-auto">
Secure serverless file sharing platform built using AWS S3, Lambda,
API Gateway and DynamoDB.
</p>
</div>

<div className="backdrop-blur-xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl max-w-3xl mx-auto">

<div
className="border-2 border-dashed border-slate-600 hover:border-blue-500 rounded-3xl p-12 text-center transition"
>
<i className="fas fa-cloud-upload-alt text-6xl text-blue-400 mb-6"></i>

<h2 className="text-2xl font-bold mb-3">Upload Your File</h2>

<p className="text-slate-400 mb-6">
Drag & drop or browse files securely.
</p>

<button
onClick={()=>fileInputRef.current.click()}
className="bg-gradient-to-r from-blue-600 to-purple-600 px-6 py-3 rounded-xl font-semibold"
>
Choose File
</button>

<input
type="file"
ref={fileInputRef}
className="hidden"
onChange={(e)=>setFile(e.target.files[0])}
/>
</div>

{file && (
<div className="mt-6 bg-slate-900 rounded-2xl border border-slate-700 p-4">
<p className="font-semibold">{file.name}</p>
<p className="text-slate-400 text-sm">
{(file.size/1024/1024).toFixed(2)} MB
</p>
</div>
)}

<button
onClick={handleUpload}
disabled={!file || uploadStatus==="uploading"}
className="w-full mt-6 py-4 rounded-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600"
>
{uploadStatus==="uploading"?"Uploading...":"Upload File"}
</button>

{shareLink && (
<div className="mt-6 bg-green-500/10 border border-green-500/30 rounded-2xl p-5">
<h3 className="text-green-400 font-bold mb-3">
✅ Upload Successful
</h3>

<div className="bg-slate-900 p-3 rounded-xl break-all">
{shareLink}
</div>

<button
onClick={()=>navigator.clipboard.writeText(shareLink)}
className="mt-4 w-full bg-blue-600 py-3 rounded-xl"
>
Copy URL
</button>
</div>
)}
</div>

<div className="grid md:grid-cols-3 gap-4 mt-12">
<div className="bg-white/5 p-5 rounded-2xl">
<h3 className="font-bold mb-2">🔒 Secure</h3>
<p className="text-slate-400">Pre-signed URLs for controlled access.</p>
</div>

<div className="bg-white/5 p-5 rounded-2xl">
<h3 className="font-bold mb-2">⚡ Fast</h3>
<p className="text-slate-400">Direct browser to S3 uploads.</p>
</div>

<div className="bg-white/5 p-5 rounded-2xl">
<h3 className="font-bold mb-2">☁ Serverless</h3>
<p className="text-slate-400">Powered by Lambda and API Gateway.</p>
</div>
</div>

<div className="text-center mt-12">
<p className="text-slate-400 mb-4">Powered by AWS</p>
<div className="flex justify-center gap-3 flex-wrap">
<span className="px-4 py-2 rounded-full bg-orange-500/10">S3</span>
<span className="px-4 py-2 rounded-full bg-yellow-500/10">Lambda</span>
<span className="px-4 py-2 rounded-full bg-green-500/10">API Gateway</span>
<span className="px-4 py-2 rounded-full bg-blue-500/10">DynamoDB</span>
</div>
</div>

<footer className="text-center text-slate-500 mt-16">
Built with AWS Serverless Architecture
</footer>

</div>
);
}

ReactDOM.render(<App />,document.getElementById("root"));
</script>
</body>
</html>
